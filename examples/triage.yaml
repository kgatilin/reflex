# triage example: classify a GitHub agent-ready issue as STUCK / HEALTHY /
# FRESH using only the real GitHub API. No LLM, no stub — pure rules over
# data fetched via `gh api`.
#
# Run:
#   reflex --config examples/triage.yaml --message "archai#114"
#   reflex --config examples/triage.yaml --message "archai#98"
#   reflex --config examples/triage.yaml --message "archai#9999"
#
# Chain:
#   RequestReceived("archai#114")
#     -> TargetParsed{owner=kgatilin, repo=archai, number=114}
#       -> GhQueryResult{path=comments}
#       -> GhQueryResult{path=timeline}
#         -> TriagePending (terminal, while one path still missing)
#         -> TriageDecided{classification, reason} (once both arrived)
#           -> printer writes the reason
#           -> terminator emits RequestHandled (terminal)
#
# On a non-existent issue (archai#9999) the gh CLI exits non-zero and
# GhQueryFailed (terminal) is emitted; the request never reaches
# TriageDecided, so the unhandled watcher emits RequestUnhandled.
settings:
  max_steps: 64

handlers:
  - name: parse
    type: parse_target
    on: RequestReceived
    emits: [TargetParsed, ParseFailed]
    config:
      default_owner: kgatilin

  - name: fetch_comments
    type: gh_query
    on: TargetParsed
    emits: [GhQueryResult, GhQueryFailed]
    config:
      path: comments

  - name: fetch_timeline
    type: gh_query
    on: TargetParsed
    emits: [GhQueryResult, GhQueryFailed]
    config:
      path: timeline

  - name: classify
    type: triage_rules
    on: GhQueryResult
    emits: [TriageDecided, TriagePending]

  - name: announce
    type: printer
    on: TriageDecided
    config:
      prefix: "triage: "
      field: reason

  - name: finalize
    type: terminator
    on: TriageDecided
    emits: [RequestHandled]

  - name: watcher
    type: unhandled_watcher
    on: __noop__
    emits: [RequestUnhandled, EventOrphaned]
